<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada - Júlio Reboques</title>
  <meta name="description" content="404 - Página não encontrada. Volte para o site da Júlio Reboques ou fale conosco pelo WhatsApp.">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
      background: linear-gradient(180deg, #eef3f8 0%, #ffffff 100%);
    }

    .error-page {
      text-align: center;
      max-width: 760px;
      width: 100%;
      padding: 40px 30px;
      border-radius: 24px;
      background: white;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(15, 23, 42, 0.05);
    }

    .error-page h1 {
      font-size: clamp(4rem, 8vw, 6.5rem);
      letter-spacing: -0.06em;
      margin-bottom: 0.6rem;
      color: var(--brand-blue);
    }

    .error-page h2 {
      font-size: clamp(1.5rem, 2vw, 2.25rem);
      margin-bottom: 1rem;
    }

    .error-page p {
      color: hsl(220, 15%, 35%);
      margin: 0 auto 1.8rem;
      max-width: 620px;
      line-height: 1.8;
    }

    .error-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .error-actions .btn.secondary {
      background: transparent;
      color: var(--brand-blue);
      border: 1px solid var(--border);
    }
  </style>
</head>

<body>
  <main class="error-page container">
    <h1>404</h1>
    <h2>Não encontramos essa página</h2>
    <p>Desculpe, a página que você procura não existe ou foi movida. Use os links abaixo para voltar ao site ou fale diretamente conosco pelo WhatsApp.</p>

    <div class="error-actions">
      <a href="index.html" class="btn">Voltar para o site</a>
      <a href="https://wa.me/551993481379" class="btn secondary">Falar no WhatsApp</a>
    </div>
  </main>
</body>

</html>
